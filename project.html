<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Tracker — BNAIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--bg); }

    .page-wrap { max-width: 1280px; margin: 0 auto; padding: 36px 40px 80px; }

    /* ── BREADCRUMB ── */
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); margin-bottom: 28px; flex-wrap: wrap; }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb .sep { opacity: 0.4; }

    /* ── PROJECT HERO ── */
    .project-hero {
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 32px;
      position: relative;
    }
    .project-hero-bg {
      height: 220px;
      display: flex;
      align-items: flex-end;
      padding: 28px 32px;
      position: relative;
    }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.85) 100%); }
    .hero-emoji { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-60%); font-size: 80px; opacity: 0.25; pointer-events: none; }
    .hero-content { position: relative; z-index: 2; flex: 1; }
    .hero-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 8px; }
    .hero-title { font-family: 'Syne', sans-serif; font-size: clamp(22px,3vw,36px); font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 10px; }
    .hero-meta { display: flex; gap: 20px; font-size: 13px; color: rgba(255,255,255,0.6); flex-wrap: wrap; }
    .hero-badges { position: absolute; top: 20px; right: 24px; display: flex; gap: 8px; z-index: 2; flex-wrap: wrap; }

    /* ── STATS ROW ── */
    .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 32px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      transition: border-color 0.2s;
    }
    .kpi-card:hover { border-color: var(--border2); }
    .kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .kpi-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; }
    .kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    /* ── MAIN GRID ── */
    .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; }

    /* ── BUILDING VISUALIZER ── */
    .building-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }
    .building-panel-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; }
    .building-viz-wrap {
      padding: 28px 32px;
      display: flex;
      gap: 32px;
      align-items: flex-end;
    }

    /* THE BUILDING */
    .building-3d {
      flex-shrink: 0;
      display: flex;
      flex-direction: column-reverse;
      gap: 3px;
      position: relative;
    }
    .floor-unit {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: default;
    }
    .floor-block {
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .floor-block::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
      pointer-events: none;
    }
    .floor-block.done {
      background: linear-gradient(135deg, #2a7a4a, #52C07A);
      color: #fff;
      box-shadow: 0 2px 8px rgba(82,192,122,0.3);
    }
    .floor-block.in-progress {
      background: linear-gradient(135deg, #a07a10, #C9A84C);
      color: #0A0A0B;
      animation: floorPulse 2s infinite;
    }
    .floor-block.pending {
      background: var(--bg3);
      border: 1px dashed rgba(255,255,255,0.12);
      color: var(--text-muted);
    }
    @keyframes floorPulse {
      0%, 100% { box-shadow: 0 2px 8px rgba(201,168,76,0.2); }
      50%       { box-shadow: 0 2px 16px rgba(201,168,76,0.5); }
    }
    .floor-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; min-width: 60px; }
    .floor-label.active { color: var(--gold); font-weight: 600; }
    .building-ground {
      height: 10px;
      background: var(--border2);
      border-radius: 4px;
      width: 100%;
    }

    /* LEGEND */
    .building-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 8px 0;
    }
    .legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .legend-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .legend-done { background: var(--green); }
    .legend-prog { background: var(--gold); }
    .legend-pend { background: var(--bg3); border: 1px dashed rgba(255,255,255,0.12); }

    /* Progress ring */
    .progress-ring-wrap { margin-top: 20px; text-align: center; }
    svg.ring { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--bg3); }
    .ring-fg { fill: none; stroke: var(--gold); stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
    .ring-pct { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--gold); }
    .ring-sub { font-size: 11px; color: var(--text-muted); }
    .ring-container { position: relative; display: inline-block; }

    /* ── MILESTONES ── */
    .milestones-panel { margin-top: 0; }
    .milestone-list { padding: 0 24px 24px; }
    .milestone-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .milestone-item:last-child { border-bottom: none; }
    .ms-dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .ms-dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      font-weight: 700;
      z-index: 1;
    }
    .ms-dot.done { background: var(--green); color: #0A0A0B; }
    .ms-dot.in-progress { background: var(--gold); color: #0A0A0B; animation: floorPulse 2s infinite; }
    .ms-dot.pending { background: var(--bg3); border: 1px solid var(--border2); color: var(--text-muted); }
    .ms-line { width: 1px; flex: 1; min-height: 20px; background: var(--border); margin: 2px 0; }
    .ms-body { flex: 1; padding-top: 2px; }
    .ms-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .ms-name.done { text-decoration: line-through; color: var(--text-muted); }
    .ms-name.in-progress { color: var(--gold); }
    .ms-date { font-size: 12px; color: var(--text-muted); }
    .ms-prog-bar { margin-top: 7px; }

    /* ── SIDEBAR PANELS ── */
    .sidebar-col { display: flex; flex-direction: column; gap: 20px; }

    .updates-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 0; }
    .update-item { padding: 14px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
    .update-item:last-child { border-bottom: none; }
    .update-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .update-date { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
    .update-text { font-size: 13px; color: var(--text-sub); line-height: 1.5; }

    .budget-bar-wrap { padding: 0 20px 20px; }
    .budget-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; }
    .budget-bar { height: 8px; border-radius: 100px; background: var(--bg3); overflow: hidden; margin-bottom: 16px; }
    .budget-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
    .budget-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }

    .info-list { padding: 0 20px 20px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-row .lbl { color: var(--text-muted); }
    .info-row .val { font-weight: 600; }

    .investors-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
    .investor-pill { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg3); border-radius: 8px; font-size: 13px; }
    .investor-av { width: 28px; height: 28px; border-radius: 50%; background: var(--gold-dim); border: 1px solid var(--gold-border); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--gold); font-weight: 700; flex-shrink: 0; }

    /* ── INFRA PROGRESS (no floors) ── */
    .infra-viz { padding: 24px; }
    .infra-phases { display: flex; flex-direction: column; gap: 12px; }
    .infra-phase { background: var(--bg3); border-radius: 10px; padding: 14px 16px; }
    .infra-phase-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 600; }
    .infra-phase-pct { font-size: 12px; color: var(--text-muted); }

    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .page-wrap { padding: 20px 16px 60px; }
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .building-viz-wrap { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="logo">BNA<span>IQ</span></a>
  <div style="display:flex;gap:10px;">
    <a href="search.html" class="btn btn-ghost btn-sm">← Browse</a>
    <a href="dashboard.html" class="btn btn-gold btn-sm">Dashboard</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- HERO -->
  <div class="project-hero" id="projectHero">
    <div class="project-hero-bg" id="heroBg">
      <div class="hero-overlay"></div>
      <div class="hero-emoji" id="heroEmoji"></div>
      <div class="hero-content">
        <div class="hero-type" id="heroType"></div>
        <div class="hero-title" id="heroTitle"></div>
        <div class="hero-meta" id="heroMeta"></div>
      </div>
      <div class="hero-badges" id="heroBadges"></div>
    </div>
  </div>

  <!-- KPI ROW -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- MAIN GRID -->
  <div class="main-grid">
    <!-- LEFT: Building + Milestones -->
    <div style="display:flex;flex-direction:column;gap:24px;">

      <!-- BUILDING VISUALIZER -->
      <div class="building-panel">
        <div class="building-panel-header">
          <div class="panel-title" id="vizTitle">Building Progress</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="badge badge-gold" id="vizFloorBadge"></span>
          </div>
        </div>
        <div id="buildingVizContent"></div>
      </div>

      <!-- MILESTONES -->
      <div class="building-panel milestones-panel">
        <div class="building-panel-header">
          <div class="panel-title">Project Milestones</div>
          <span id="msProgress" class="badge badge-green"></span>
        </div>
        <div class="milestone-list" id="milestoneList"></div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sidebar-col">

      <!-- BUDGET -->
      <div class="building-panel">
        <div class="building-panel-header"><div class="panel-title">Budget Tracker</div></div>
        <div class="budget-bar-wrap" id="budgetWrap"></div>
      </div>

      <!-- LATEST UPDATES -->
      <div class="building-panel">
        <div class="building-panel-header">
          <div class="panel-title">Latest Updates</div>
          <span style="font-size:12px;color:var(--text-muted);" id="lastUpdated"></span>
        </div>
        <div class="updates-list" id="updatesList"></div>
      </div>

      <!-- PROJECT INFO -->
      <div class="building-panel">
        <div class="building-panel-header"><div class="panel-title">Project Details</div></div>
        <div class="info-list" id="infoList"></div>
      </div>

      <!-- INVESTORS -->
      <div class="building-panel">
        <div class="building-panel-header"><div class="panel-title">Stakeholders</div></div>
        <div class="investors-list" id="investorsList"></div>
      </div>

    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ── Load project ──
const params = new URLSearchParams(window.location.search);
const pid = params.get('id') || sessionStorage.getItem('viewingProject') || 'p1';
const project = BNAIQ.getProject(pid);
const company = project ? BNAIQ.getCompany(project.companyId) : null;

if (!project) {
  document.body.innerHTML = '<div style="padding:80px;text-align:center;font-family:sans-serif;color:#fff;"><h2>Project not found.</h2><a href="search.html" style="color:#C9A84C;">← Back to search</a></div>';
  throw new Error('no project');
}

// ── PAGE TITLE ──
document.title = project.name + ' — BNAIQ Tracker';

// ── BREADCRUMB ──
document.getElementById('breadcrumb').innerHTML = `
  <a href="index.html">Home</a><span class="sep">/</span>
  <a href="search.html">Companies</a><span class="sep">/</span>
  <a href="company-profile.html?id=${company?.id || ''}">${company?.name || 'Company'}</a><span class="sep">/</span>
  <span style="color:var(--text)">${project.name}</span>
`;

// ── HERO ──
document.getElementById('heroBg').style.background = `linear-gradient(135deg, ${project.coverColor} 0%, #0A0A0B 100%)`;
document.getElementById('heroEmoji').textContent = project.emoji;
document.getElementById('heroType').textContent = project.type;
document.getElementById('heroTitle').textContent = project.name;
document.getElementById('heroMeta').innerHTML = `
  <span>📍 ${project.location}</span>
  <span>💰 ${project.value}</span>
  <span>📅 ${project.startDate} → ${project.endDate}</span>
`;
const statusBadge = project.status === 'complete'
  ? '<span class="badge badge-green">✓ Complete</span>'
  : '<span class="badge badge-gold">● Active</span>';
document.getElementById('heroBadges').innerHTML = statusBadge + (company ? `<span class="badge badge-muted">${company.name}</span>` : '');

// ── KPI ROW ──
const daysLeft = project.status === 'complete' ? '—' : Math.max(0, Math.round((new Date(project.endDate) - new Date()) / 86400000));
const doneMs = project.milestones.filter(m => m.done).length;
const floorText = project.totalFloors > 0 ? `${project.completedFloors} / ${project.totalFloors}` : 'N/A';
document.getElementById('kpiRow').innerHTML = `
  <div class="kpi-card">
    <div class="kpi-label">Overall Progress</div>
    <div class="kpi-value" style="color:var(--gold)">${project.progressPct}%</div>
    <div class="kpi-sub">${project.status === 'complete' ? 'Completed' : 'In progress'}</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Floors Done</div>
    <div class="kpi-value">${floorText}</div>
    <div class="kpi-sub">${project.totalFloors > 0 ? 'storeys' : 'Linear project'}</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Milestones</div>
    <div class="kpi-value" style="color:var(--green)">${doneMs}/${project.milestones.length}</div>
    <div class="kpi-sub">complete</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Budget Spent</div>
    <div class="kpi-value">${Math.round(project.budget.spent / project.budget.total * 100)}%</div>
    <div class="kpi-sub">${project.budget.spent} / ${project.budget.total} ${project.budget.currency}</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">${project.status === 'complete' ? 'Completed' : 'Days Left'}</div>
    <div class="kpi-value" style="color:${daysLeft < 90 && daysLeft !== '—' ? 'var(--red)' : 'var(--text)'}">${daysLeft}</div>
    <div class="kpi-sub">${project.status === 'complete' ? '🎉 Handed over' : 'until handover'}</div>
  </div>
`;

// ── BUILDING VISUALIZER ──
function renderBuildingViz() {
  const content = document.getElementById('buildingVizContent');
  const floorBadge = document.getElementById('vizFloorBadge');

  if (project.totalFloors === 0) {
    // Infrastructure / non-floor project
    document.getElementById('vizTitle').textContent = 'Phase Progress';
    floorBadge.textContent = project.progressPct + '% complete';

    // Group milestones into visual phases
    const phases = project.milestones;
    content.innerHTML = `
      <div class="infra-viz">
        <div style="display:flex;gap:24px;align-items:center;margin-bottom:28px;flex-wrap:wrap;">
          <div class="ring-container" style="width:120px;height:120px;">
            <svg class="ring" width="120" height="120" viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="50" stroke-width="10"/>
              <circle class="ring-fg" cx="60" cy="60" r="50" stroke-width="10"
                stroke-dasharray="${2*Math.PI*50}"
                stroke-dashoffset="${2*Math.PI*50 * (1 - project.progressPct/100)}"/>
            </svg>
            <div class="ring-center">
              <div class="ring-pct">${project.progressPct}%</div>
              <div class="ring-sub">done</div>
            </div>
          </div>
          <div style="flex:1;min-width:180px;">
            <div style="font-size:28px;font-family:'Syne',sans-serif;font-weight:800;margin-bottom:4px;">${project.location}</div>
            <div style="font-size:14px;color:var(--text-muted);line-height:1.6;">${project.description}</div>
          </div>
        </div>
        <div class="infra-phases">
          ${phases.map(p => {
            const pct = p.done ? 100 : (p.pct || 0);
            const cls = p.done ? 'var(--green)' : pct > 0 ? 'var(--gold)' : 'var(--bg3)';
            return `
              <div class="infra-phase">
                <div class="infra-phase-header">
                  <span>${p.done ? '✓ ' : pct > 0 ? '● ' : '○ '}${p.name}</span>
                  <span class="infra-phase-pct">${pct}%</span>
                </div>
                <div class="progress-wrap">
                  <div class="progress-fill" style="width:${pct}%;background:${cls};"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
    return;
  }

  // FLOOR-BASED building viz
  document.getElementById('vizTitle').textContent = 'Building Floor Progress';
  floorBadge.textContent = `${project.completedFloors} of ${project.totalFloors} floors`;

  const floors = [];
  for (let f = 1; f <= project.totalFloors; f++) {
    let state = 'pending';
    if (f <= project.completedFloors) state = 'done';
    else if (f === project.completedFloors + 1) state = 'in-progress';
    floors.push({ num: f, state });
  }

  // Max ~30 floors visible; condense if more
  const MAX_SHOWN = 30;
  let shown = floors;
  let condensed = false;
  if (floors.length > MAX_SHOWN) {
    condensed = true;
    // Show bottom 12, middle "..." block, top 8
    shown = [...floors.slice(0, 12), { num: '...', state: 'divider' }, ...floors.slice(-8)];
  }

  const FLOOR_W = 160;

  const floorHTML = shown.map(f => {
    if (f.state === 'divider') return `<div style="text-align:center;font-size:13px;color:var(--text-muted);padding:4px 0;">⋮ ${project.totalFloors - 20} more floors</div>`;
    const label = f.num === 1 ? 'Ground' : `Floor ${f.num}`;
    const isActive = f.state === 'in-progress';
    return `
      <div class="floor-unit" title="${label} — ${f.state}">
        <div class="floor-block ${f.state}" style="width:${FLOOR_W}px;">
          ${f.state === 'done' ? '✓' : f.state === 'in-progress' ? '▶ Active' : ''}
        </div>
        <span class="floor-label ${isActive ? 'active' : ''}">${label}${isActive ? ' ←' : ''}</span>
      </div>
    `;
  }).reverse().join('');

  // Ring
  const r = 54, circ = 2 * Math.PI * r;
  const dash = circ * (1 - project.progressPct / 100);

  content.innerHTML = `
    <div class="building-viz-wrap">
      <!-- Building -->
      <div style="display:flex;flex-direction:column;gap:0;">
        <div class="building-3d">${floorHTML}</div>
        <div class="building-ground" style="width:${FLOOR_W + 80}px; margin-top:4px;"></div>
        <div style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:6px;">GROUND LEVEL</div>
      </div>

      <!-- Legend + Ring -->
      <div style="display:flex;flex-direction:column;gap:20px;padding-bottom:12px;">
        <div class="building-legend">
          <div class="legend-item"><div class="legend-dot legend-done"></div><span>Complete (${project.completedFloors} floors)</span></div>
          <div class="legend-item"><div class="legend-dot legend-prog"></div><span>In Progress</span></div>
          <div class="legend-item"><div class="legend-dot legend-pend"></div><span>Pending (${project.totalFloors - project.completedFloors - 1} floors)</span></div>
        </div>

        <div style="text-align:center;">
          <div class="ring-container" style="width:124px;height:124px;">
            <svg class="ring" width="124" height="124" viewBox="0 0 124 124">
              <circle class="ring-bg" cx="62" cy="62" r="${r}" stroke-width="11"/>
              <circle class="ring-fg" cx="62" cy="62" r="${r}" stroke-width="11"
                stroke-dasharray="${circ.toFixed(1)}"
                stroke-dashoffset="${dash.toFixed(1)}"/>
            </svg>
            <div class="ring-center">
              <div class="ring-pct">${project.progressPct}%</div>
              <div class="ring-sub">complete</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── MILESTONES ──
function renderMilestones() {
  const doneCount = project.milestones.filter(m => m.done).length;
  document.getElementById('msProgress').textContent = `${doneCount}/${project.milestones.length} done`;

  document.getElementById('milestoneList').innerHTML = project.milestones.map((m, i) => {
    const pct = m.done ? 100 : (m.pct || 0);
    const state = m.done ? 'done' : pct > 0 ? 'in-progress' : 'pending';
    const icon = m.done ? '✓' : pct > 0 ? '▶' : (i + 1).toString();
    const isLast = i === project.milestones.length - 1;
    return `
      <div class="milestone-item">
        <div class="ms-dot-wrap">
          <div class="ms-dot ${state}">${icon}</div>
          ${!isLast ? '<div class="ms-line"></div>' : ''}
        </div>
        <div class="ms-body">
          <div class="ms-name ${state}">${m.name}</div>
          <div class="ms-date">${m.done ? '✓ Completed ' : ''}${m.date}</div>
          ${!m.done && pct > 0 ? `
            <div class="ms-prog-bar">
              <div class="progress-wrap">
                <div class="progress-fill" style="width:${pct}%;"></div>
              </div>
              <div style="font-size:11px;color:var(--gold);margin-top:3px;">${pct}% in progress</div>
            </div>
          ` : ''}
        </div>
        <div>
          ${m.done ? '<span class="badge badge-green">Done</span>' : pct > 0 ? '<span class="badge badge-gold">Active</span>' : '<span class="badge badge-muted">Pending</span>'}
        </div>
      </div>
    `;
  }).join('');
}

// ── BUDGET ──
function renderBudget() {
  const pct = Math.round(project.budget.spent / project.budget.total * 100);
  document.getElementById('budgetWrap').innerHTML = `
    <div class="budget-row">
      <span style="color:var(--text-muted);">Total Budget</span>
      <span style="font-weight:700;">${project.budget.total} ${project.budget.currency}</span>
    </div>
    <div class="budget-row">
      <span style="color:var(--text-muted);">Spent to Date</span>
      <span style="font-weight:700;color:var(--gold);">${project.budget.spent} ${project.budget.currency}</span>
    </div>
    <div class="budget-bar">
      <div class="budget-fill" style="width:${pct}%"></div>
    </div>
    <div class="budget-labels">
      <span>0</span>
      <span style="color:var(--gold);font-weight:600;">${pct}% used</span>
      <span>${project.budget.total} ${project.budget.currency}</span>
    </div>
    <div style="margin-top:14px;padding:12px;background:var(--bg3);border-radius:8px;font-size:13px;">
      <div style="display:flex;justify-content:space-between;">
        <span style="color:var(--text-muted);">Remaining</span>
        <span style="font-weight:700;color:var(--green);">${(project.budget.total - project.budget.spent).toFixed(1)} ${project.budget.currency}</span>
      </div>
    </div>
  `;
}

// ── UPDATES ──
function renderUpdates() {
  if (!project.updates.length) return;
  document.getElementById('lastUpdated').textContent = project.updates[0].date;
  document.getElementById('updatesList').innerHTML = project.updates.map(u => `
    <div class="update-item">
      <div class="update-dot"></div>
      <div>
        <div class="update-date">${u.date}</div>
        <div class="update-text">${u.text}</div>
      </div>
    </div>
  `).join('');
}

// ── PROJECT INFO ──
function renderInfo() {
  document.getElementById('infoList').innerHTML = `
    <div class="info-row"><span class="lbl">Company</span><span class="val">${company?.name || '—'}</span></div>
    <div class="info-row"><span class="lbl">Location</span><span class="val">${project.location}</span></div>
    <div class="info-row"><span class="lbl">Contract Value</span><span class="val">${project.value}</span></div>
    <div class="info-row"><span class="lbl">Start Date</span><span class="val">${project.startDate}</span></div>
    <div class="info-row"><span class="lbl">Target Handover</span><span class="val">${project.endDate}</span></div>
    <div class="info-row"><span class="lbl">Status</span>
      <span class="val">${project.status === 'complete' ? '<span class="badge badge-green">Complete</span>' : '<span class="badge badge-gold">Active</span>'}</span>
    </div>
    ${project.totalFloors > 0 ? `<div class="info-row"><span class="lbl">Total Floors</span><span class="val">${project.totalFloors}</span></div>` : ''}
  `;
}

// ── INVESTORS ──
function renderInvestors() {
  document.getElementById('investorsList').innerHTML = project.investors.map(inv => `
    <div class="investor-pill">
      <div class="investor-av">${inv[0].toUpperCase()}</div>
      <span style="font-size:13px;font-weight:500;">${inv}</span>
      <span class="badge badge-green" style="margin-left:auto;font-size:10px;">Stakeholder</span>
    </div>
  `).join('') + `
    <div style="margin-top:8px;padding:10px;background:var(--bg3);border-radius:8px;text-align:center;">
      <button class="btn btn-outline-gold btn-sm" onclick="alert('Investor access request sent!')">Request Investor Access</button>
    </div>
  `;
}

// ── RENDER ALL ──
renderBuildingViz();
renderMilestones();
renderBudget();
renderUpdates();
renderInfo();
renderInvestors();
</script>
</body>
</html>
