<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Chiaro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --gold:#C9A84C; --bg:#0A0A0B; --text:#F0EDE6; --text-muted:#8A8880; --border:rgba(255,255,255,0.07); --surface:#1E1E25; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; }
    .grid-bg { position:fixed; inset:0; background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; }
    .code { font-family:'Syne',sans-serif; font-size:clamp(80px,15vw,160px); font-weight:800; line-height:1; color:var(--gold); opacity:0.15; margin-bottom:-16px; }
    h1 { font-family:'Syne',sans-serif; font-size:clamp(24px,4vw,40px); font-weight:800; margin-bottom:14px; }
    p { color:var(--text-muted); font-size:16px; max-width:400px; margin-bottom:36px; line-height:1.7; }
    .actions { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; padding:12px 28px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; text-decoration:none; cursor:pointer; border:none; transition:all 0.2s; }
    .btn-gold { background:var(--gold); color:#0A0A0B; }
    .btn-gold:hover { background:#E8C97A; }
    .btn-ghost { background:none; border:1px solid var(--border); color:var(--text-muted); }
    .btn-ghost:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
  <div class="actions">
    <a id="homeBtn" href="./index.html" class="btn btn-gold">← Back to Home</a>
    <a id="browseBtn" href="./search.html" class="btn btn-ghost">Browse Companies</a>
  </div>
<script>
(function(){
  var path = location.pathname.split('/').filter(Boolean);
  var base = './';
  if (location.hostname.endsWith('github.io') && path.length > 0) {
    // GitHub project site: /repo-name/...
    base = '/' + path[0] + '/';
  }
  document.getElementById('homeBtn').href = base + 'index.html';
  document.getElementById('browseBtn').href = base + 'search.html';
})();
</script>
</body>
</html>
